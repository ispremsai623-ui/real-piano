<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>REAL PIANO 🎹</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

<style>
body {
    margin:0;
    background:#000;
    color:white;
    font-family:Orbitron;
    text-align:center;
}

/* SPLASH */
#splash {
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
    animation:fadeOut 1s ease forwards;
    animation-delay:3s;
}

#logoImg {
    width:220px;
    height:220px;
    object-fit:cover;
    border-radius:50%;
    border:3px solid #00f0ff;

    box-shadow:
        0 0 20px #00f0ff,
        0 0 60px rgba(0,240,255,0.7),
        inset 0 0 30px rgba(0,240,255,0.5);

    animation:zoom 2s ease;
}

@keyframes zoom {
    0% { transform:scale(0.3); opacity:0; }
    70% { transform:scale(1.2); opacity:1; }
    100% { transform:scale(1); }
}

@keyframes fadeOut {
    to { opacity:0; visibility:hidden; }
}

/* TITLE */
h2 {
    letter-spacing:3px;
    text-shadow:0 0 10px #00f0ff;
}

/* PIANO */
.piano {
    position:relative;
    height:260px;
    width:3600px;
}

.white {
    position:absolute;
    width:40px;
    height:230px;
    background:white;
    border:1px solid black;
    display:flex;
    align-items:end;
    justify-content:center;
    color:black;
    font-size:12px;
}

.black {
    position:absolute;
    width:25px;
    height:140px;
    background:black;
    z-index:2;
    display:flex;
    align-items:end;
    justify-content:center;
    font-size:10px;
    color:white;
}

.active {
    background:orange !important;
}

/* GAME */
#gameCanvas {
    position:absolute;
    top:0;
    left:0;
    pointer-events:none;
}
</style>
</head>

<h2>🎹 REAL PIANO</h2>

<button onclick="startPiano()">Start</button>
<button onclick="startRecording()">● Record</button>
<button onclick="playRecording()">▶ Play</button>
<button onclick="download()">💾 Download</button>
<button onclick="startGame()">🎮 Game</button>

<p>SPACE = Sustain</p>

<canvas id="gameCanvas" width="1200" height="400"></canvas>

<div style="overflow-x:auto">
    <div class="piano" id="piano"></div>
</div>

<script>
// REMOVE SPLASH
window.onload = () => {
    setTimeout(() => {
        document.getElementById("splash").remove();
    }, 3500);
};

// AUDIO
let sampler, recorder, started=false;

async function startPiano(){
    if(started) return;
    await Tone.start();

    sampler = new Tone.Sampler({
        urls:{ C4:"C4.mp3" },
        baseUrl:"https://tonejs.github.io/audio/salamander/"
    }).toDestination();

    recorder = new Tone.Recorder();
    sampler.connect(recorder);

    started=true;
    alert("Piano Ready 🎹");
}

// NOTES (88 KEYS)
const notes=[];
const names=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

for(let i=0;i<88;i++){
    let o=Math.floor((i+9)/12);
    notes.push(names[(i+9)%12]+o);
}

// FULL KEYBOARD MAP
const keyMap =
"1234567890-=qwertyuiop[]asdfghjkl;zxcvbnm,./".split("");

let offset=20;

// BUILD PIANO
const piano=document.getElementById("piano");
let whiteIndex=0;

notes.forEach((n,i)=>{
    let key=document.createElement("div");
    let black=n.includes("#");

    key.className=black?"black":"white";

    if(!black){
        key.style.left=(whiteIndex*40)+"px";
        whiteIndex++;
    } else {
        key.style.left=((whiteIndex-1)*40+25)+"px";
    }

    let label=document.createElement("span");
    let idx=i-offset;

    if(idx>=0 && idx<keyMap.length){
        label.innerText=keyMap[idx];
    }

    key.appendChild(label);
    piano.appendChild(key);

    key.onmousedown=()=>play(n,i);
    key.onmouseup=()=>stop(n,i);
});

// PLAY
let sustain=false;
let record=[];
let recording=false;

function play(n,i){
    if(!sampler) return;

    sampler.triggerAttack(n);
    piano.children[i].classList.add("active");

    if(recording){
        record.push({n,time:Date.now()});
    }
}

function stop(n,i){
    if(!sampler) return;

    if(!sustain){
        sampler.triggerRelease(n);
    }

    piano.children[i].classList.remove("active");
}

// KEYBOARD CONTROL
document.addEventListener("keydown",e=>{
    if(!started || e.repeat) return;

    if(e.key===" "){
        sustain=true;
        return;
    }

    let i=keyMap.indexOf(e.key);

    if(i!==-1){
        let idx=i+offset;
        play(notes[idx],idx);
    }
});

document.addEventListener("keyup",e=>{
    if(!started) return;

    if(e.key===" "){
        sustain=false;
        sampler.releaseAll();
        return;
    }

    let i=keyMap.indexOf(e.key);

    if(i!==-1){
        let idx=i+offset;
        stop(notes[idx],idx);
    }
});

// RECORD
function startRecording(){
    record=[];
    recording=true;
}

function playRecording(){
    if(record.length===0) return;

    let start=record[0].time;

    record.forEach(e=>{
        setTimeout(()=>{
            sampler.triggerAttackRelease(e.n,"8n");
        }, e.time - start);
    });
}

// DOWNLOAD
async function download(){
    const rec = await recorder.stop();
    const url = URL.createObjectURL(rec);

    const a = document.createElement("a");
    a.href = url;
    a.download = "recording.wav";
    a.click();
}

// GAME MODE
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

let falling=[];

function startGame(){
    setInterval(()=>{
        falling.push({x:Math.random()*canvas.width,y:0});
    },400);

    requestAnimationFrame(loop);
}

function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    falling.forEach(n=>{
        n.y+=4;
        ctx.fillStyle="cyan";
        ctx.fillRect(n.x,n.y,10,20);
    });

    requestAnimationFrame(loop);
}
</script>

</body>
